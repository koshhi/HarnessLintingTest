rules:
  metadata-required-non-empty:
    fields: 
    - title
    - description
    - author
    enabled: true
  no-trailing-spaces:
    enabled: true
  no-multiple-blank-lines:
    enabled: true
  require-links:
    enabled: true
overrides:
  - files: ["README.md", "AGENTS.md"]
    rules:
      require-links:
        enabled: false
      metadata-required-non-empty:
        enabled: false
